server:
  port: 8080

spring:
  application:
    name: study-life-server
  datasource:
    url: jdbc:mysql://localhost:13306/study_life_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.sakura.studylife.entity
  configuration:
    map-underscore-to-camel-case: true

study-life:
  jwt:
    secret: 1234567890StudyLifeSecretKey1234567890
    expire-seconds: 7200
    issuer: study-life-server

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
